<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="lensGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE"/>
      <stop offset="100%" stop-color="#8A2BE2"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Rounded Square Background -->
  <rect x="4" y="4" width="56" height="56" rx="14" fill="#0A0D14" stroke="url(#lensGrad)" stroke-width="3"/>
  
  <!-- Diagnostic Lens Outer Ring -->
  <circle cx="32" cy="32" r="16" stroke="url(#lensGrad)" stroke-width="3" stroke-dasharray="8 4"/>
  
  <!-- Inner Scanner Core -->
  <circle cx="32" cy="32" r="7" fill="#00F2FE" filter="url(#glow)"/>
  
  <!-- Laser Crosshairs -->
  <line x1="32" y1="10" x2="32" y2="16" stroke="#00F2FE" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="48" x2="32" y2="54" stroke="#00F2FE" stroke-width="2" stroke-linecap="round"/>
  <line x1="10" y1="32" x2="16" y2="32" stroke="#00F2FE" stroke-width="2" stroke-linecap="round"/>
  <line x1="48" y1="32" x2="54" y2="32" stroke="#00F2FE" stroke-width="2" stroke-linecap="round"/>
</svg>
